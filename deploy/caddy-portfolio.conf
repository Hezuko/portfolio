# ── Portfolio Henoc Mukumbi ──────────────────────────────
# Bloc à ajouter au Caddyfile de JoyTrain (/srv/joytrain/deploy/Caddyfile).
# Ajout idempotent recommandé :
#   sudo bash -c 'grep -q henocmukumbi /srv/joytrain/deploy/Caddyfile \
#     || cat /srv/portfolio/deploy/caddy-portfolio.conf >> /srv/joytrain/deploy/Caddyfile'

www.henocmukumbi.com {
	redir https://henocmukumbi.com{uri} permanent
}

henocmukumbi.com {
	header {
		Strict-Transport-Security "max-age=31536000; includeSubDomains"
		X-Content-Type-Options "nosniff"
		X-Frame-Options "DENY"
		Referrer-Policy "strict-origin-when-cross-origin"
		-Server
	}
	reverse_proxy portfolio:3000
}
