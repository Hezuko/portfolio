# portfolio-redirect-block — redirige www vers l'apex henocmukumbi.com.
# Ajout idempotent (garde-fou sur le marqueur, aucun "www." dans la commande) :
#   sudo bash -c 'grep -q portfolio-redirect-block /srv/joytrain/deploy/Caddyfile \
#     || cat /srv/portfolio/deploy/caddy-portfolio-www.conf >> /srv/joytrain/deploy/Caddyfile'
# Puis : restart caddy (PAS reload — bind-mount fichier = gel d'inode).

www.henocmukumbi.com {
	redir https://henocmukumbi.com{uri} permanent
}
