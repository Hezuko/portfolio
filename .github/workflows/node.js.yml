# CI : lint + tests à chaque push / PR sur develop et main.
# Les tests tournent contre un PostgreSQL éphémère seedé avec db/seed.sql
# (schéma + contenu public, sans données utilisateurs/contacts) — aucun secret requis.

name: CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  lint:
    name: Lint (ESLint + Stylelint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Stylelint
        run: npm run lint:css

  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: "postgres://portfolio:portfolio@localhost:5432/portfolio_test"
      DB_SSL: "false"
      SESSION_SECRET: "ci-test-secret"
      # CLOUDINARY_URL factice : les tests ne vérifient que la STRUCTURE des URLs signées,
      # pas une vraie livraison. Format cloudinary://<key>:<secret>@<cloud>.
      CLOUDINARY_URL: "cloudinary://123456789012345:ci_test_secret_abcdefghijklmno@demo-ci"
      NODE_ENV: "test"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Seed test database
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f db/seed.sql

      - name: Run tests
        run: npm test
